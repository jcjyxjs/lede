name: Sync Fork with Upstream

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      # 检出你的仓库
      - name: Checkout repository
        uses: actions/checkout@v3

      # 配置 Git 用户信息
      - name: Set up Git
        run: |
          git config --global user.name "jcjyxjs"  # 替换为你的 GitHub 用户名
          git config --global user.email "jcjyxjs@qq.com"  # 替换为你的邮箱地址

      # 添加 upstream 仓库并同步
      - name: Sync fork with upstream
        run: |
          git remote add upstream https://github.com/coolsnowwolf/lede.git  # 将原始仓库的地址添加为 upstream
          git fetch upstream
          git checkout master  # 或者根据你的默认分支修改，例如 master
          git merge upstream/master  # 合并 upstream 的 main 分支（或 master）
          git push origin master  # 将更新推送到你的 fork 仓库
