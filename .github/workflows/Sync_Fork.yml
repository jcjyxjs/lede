name: Sync Fork with Upstream

on:
  schedule:
    - cron: '0 17 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Git
        run: |
          git config --global user.name "jcjyxjs"
          git config --global user.email "jcjyxjs@qq.com"

      - name: Sync fork with upstream
        run: |
          git remote add upstream https://github.com/coolsnowwolf/lede.git
          git fetch upstream
          git checkout master
          git merge upstream/master --allow-unrelated-histories
          git push origin master

      - name: Trigger OpenWrt CI
        if: success()
        run: |
          echo "Sync Fork with Upstream completed, now triggering OpenWrt CI..."
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/openwrt-ci.yml/dispatches \
            -d '{"ref":"master"}'  # 你可以根据需要修改这里的 ref，如 main 或其他分支
